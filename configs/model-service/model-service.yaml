service:
  name: model-service
  default_backend: mock
  api_compatibility: openai-like

runtime:
  request_timeout_seconds: 60
  max_concurrent_requests: 8
  overload_status_code: 503
  request_id_header: X-Request-ID

model:
  id: mock-gpt
  path: /models/mock-gpt
  runtime_mode: development
  ready_on_startup: true

backends:
  mock:
    enabled: true
    notes: Deterministic local backend for service smoke tests and API verification.
  tensorrt_llm:
    enabled: false
    mode: proxy
    model_id: nvidia/Llama-3.3-70B-Instruct-NVFP4
    serve_base_url: http://tensorrt-llm:8000
    engine_path: /models/tensorrt-llm/llama-3.3-70b-instruct-nvfp4
    checkpoint_path: null
    hf_cache_dir: /root/.cache/huggingface
    max_batch_size: 1
    max_num_tokens: 2048
    max_seq_len: 8192
    tokenizer_path: /models/tensorrt-llm/llama-3.3-70b-instruct-nvfp4
    embedded_host: 127.0.0.1
    embedded_port: 8020
    embedded_backend: tensorrt
    server_start_timeout_seconds: 180
    executable: trtllm-serve
    max_batch_size: null
    request_timeout_seconds: 30
    notes: Preferred NVIDIA-optimized backend. Proxy mode is working now. Engine mode can use either a prebuilt engine directory or a locally cached Hugging Face checkpoint plus tokenizer assets inside a TensorRT-capable model-service image.
  vllm:
    enabled: false
    notes: Alternative local serving backend if OpenAI-compatible semantics are prioritized.
