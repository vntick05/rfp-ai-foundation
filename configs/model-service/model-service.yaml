service:
  name: model-service
  default_backend: mock
  api_compatibility: openai-like

backends:
  mock:
    enabled: true
    notes: Minimal placeholder backend for foundation-stage health checks.
  tensorrt_llm:
    enabled: false
    notes: Preferred future NVIDIA-optimized backend on DGX Spark.
  vllm:
    enabled: false
    notes: Alternative local serving backend if OpenAI-compatible semantics are prioritized.
