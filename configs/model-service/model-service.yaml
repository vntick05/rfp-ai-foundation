service:
  name: model-service
  default_backend: mock
  api_compatibility: openai-like

model:
  id: mock-gpt
  path: /models/mock-gpt
  runtime_mode: development
  ready_on_startup: true

backends:
  mock:
    enabled: true
    notes: Deterministic local backend for service smoke tests and API verification.
  tensorrt_llm:
    enabled: false
    mode: proxy
    model_id: nvidia/Llama-3.3-70B-Instruct-NVFP4
    serve_base_url: http://tensorrt-llm:8000
    engine_path: /models/tensorrt-llm/llama-3.3-70b-instruct-nvfp4
    tokenizer_path: /models/tensorrt-llm/llama-3.3-70b-instruct-nvfp4
    max_batch_size: null
    request_timeout_seconds: 30
    notes: Preferred NVIDIA-optimized backend. This checkpoint integrates against a local trtllm-serve endpoint or verifies prebuilt engine prerequisites honestly.
  vllm:
    enabled: false
    notes: Alternative local serving backend if OpenAI-compatible semantics are prioritized.
