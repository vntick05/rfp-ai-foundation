services:
  tensorrt-llm:
    image: ${TENSORRT_LLM_IMAGE:-nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc3}
    container_name: rfp-foundation-tensorrt-llm
    profiles: ["tensorrt-llm"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HF_HOME: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    command:
      - trtllm-serve
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - ${TENSORRT_LLM_MODEL_ID:-nvidia/Llama-3.3-70B-Instruct-NVFP4}
    ipc: host
    ports:
      - "${TENSORRT_LLM_PORT:-8000}:8000"
    volumes:
      - ./data/cache/huggingface:/root/.cache/huggingface
      - ./data/models/tensorrt-llm:/models/tensorrt-llm
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  portainer:
    image: portainer/portainer-ce:lts
    container_name: rfp-foundation-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT:-19443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

  postgres:
    image: postgres:16-alpine
    container_name: rfp-foundation-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  orchestrator-api:
    build:
      context: .
      dockerfile: services/orchestrator-api/Dockerfile
    container_name: rfp-foundation-orchestrator-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: development
      LOG_LEVEL: ${ORCHESTRATOR_LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ORCHESTRATOR_API_PORT:-18010}:8010"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8010/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  model-service:
    build:
      context: .
      dockerfile: services/model-service/Dockerfile
    container_name: rfp-foundation-model-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: development
      LOG_LEVEL: ${MODEL_SERVICE_LOG_LEVEL:-INFO}
      MODEL_SERVICE_BACKEND: ${MODEL_SERVICE_BACKEND:-mock}
      MODEL_SERVICE_HOST: ${MODEL_SERVICE_HOST:-0.0.0.0}
      MODEL_SERVICE_PORT: ${MODEL_SERVICE_PORT_INTERNAL:-8011}
      MODEL_SERVICE_CONFIG_PATH: ${MODEL_SERVICE_CONFIG_PATH:-/app/configs/model-service.yaml}
      MODEL_SERVICE_MODEL_ID: ${MODEL_SERVICE_MODEL_ID:-mock-gpt}
      MODEL_SERVICE_MODEL_PATH: ${MODEL_SERVICE_MODEL_PATH:-/models/mock-gpt}
      MODEL_SERVICE_RUNTIME_MODE: ${MODEL_SERVICE_RUNTIME_MODE:-development}
      MODEL_SERVICE_TENSORRT_LLM_MODE: ${MODEL_SERVICE_TENSORRT_LLM_MODE:-proxy}
      MODEL_SERVICE_TENSORRT_LLM_BASE_URL: ${MODEL_SERVICE_TENSORRT_LLM_BASE_URL:-http://tensorrt-llm:8000}
      MODEL_SERVICE_TENSORRT_LLM_MODEL_ID: ${MODEL_SERVICE_TENSORRT_LLM_MODEL_ID:-nvidia/Llama-3.3-70B-Instruct-NVFP4}
      MODEL_SERVICE_TENSORRT_LLM_ENGINE_PATH: ${MODEL_SERVICE_TENSORRT_LLM_ENGINE_PATH:-/models/tensorrt-llm/llama-3.3-70b-instruct-nvfp4}
      MODEL_SERVICE_TENSORRT_LLM_TOKENIZER_PATH: ${MODEL_SERVICE_TENSORRT_LLM_TOKENIZER_PATH:-/models/tensorrt-llm/llama-3.3-70b-instruct-nvfp4}
      MODEL_SERVICE_TENSORRT_LLM_REQUEST_TIMEOUT_SECONDS: ${MODEL_SERVICE_TENSORRT_LLM_REQUEST_TIMEOUT_SECONDS:-30}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ./configs/model-service:/app/configs:ro
      - ./data/models:/models
    ports:
      - "${MODEL_SERVICE_PORT:-18011}:8011"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8011/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  portainer-data:
  postgres-data:
