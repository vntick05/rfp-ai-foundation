services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: rfp-foundation-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT:-19443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data

  postgres:
    image: postgres:16-alpine
    container_name: rfp-foundation-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  orchestrator-api:
    build:
      context: .
      dockerfile: services/orchestrator-api/Dockerfile
    container_name: rfp-foundation-orchestrator-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: development
      LOG_LEVEL: ${ORCHESTRATOR_LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ORCHESTRATOR_API_PORT:-18010}:8010"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8010/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  model-service:
    build:
      context: .
      dockerfile: services/model-service/Dockerfile
    container_name: rfp-foundation-model-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: development
      LOG_LEVEL: ${MODEL_SERVICE_LOG_LEVEL:-INFO}
      MODEL_SERVICE_BACKEND: ${MODEL_SERVICE_BACKEND:-mock}
      MODEL_SERVICE_HOST: ${MODEL_SERVICE_HOST:-0.0.0.0}
      MODEL_SERVICE_PORT: ${MODEL_SERVICE_PORT_INTERNAL:-8011}
      MODEL_SERVICE_CONFIG_PATH: ${MODEL_SERVICE_CONFIG_PATH:-/app/configs/model-service.yaml}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - ./configs/model-service:/app/configs:ro
    ports:
      - "${MODEL_SERVICE_PORT:-18011}:8011"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8011/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  portainer-data:
  postgres-data:
